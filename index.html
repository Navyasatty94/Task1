<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title><body>
        <h3>Register Page</h3>
    <form action="./login.html">
        <input type="text" name="name" placeholder="Enter your name" ><br><br>
        <input type="email" name="email" placeholder="Enter mail" ><br><br>
        <input type="password" name="password" placeholder="Enter password"><br><br>
        <input type="password" name="confirm password" placeholder="Confirm password"><br><br>
        <input type="phone" name="phoneno" placeholder="Enter phone"><br><br>
        

        <div>
              <input type="radio" name="gender" id="gmale" value="male">
              <label for="gmale">Male</label>
              <input type="radio" name="gender" id="gfemale" value="female">
              <label for="gfemale">Female</label>

        </div><br>
        <div>
            <input type="checkbox" value="10th"/>10th
            <input type="checkbox" value="Inter"/>Inter
            <input type="checkbox" value="Diploma"/>Diploma
            <input type="checkbox" value="BTech"/>BTech
        </div><br>

        <div>
            <select>
                  <option value="">Select your city</option>
                  <option value="Chennai">Chennai</option>
                  <option value="Vizag">Vizag</option>
                  <option value="Mumbai">Mumbai</option>
            </select>
        </div><br>
        <div>
            <textarea placeholder="Enter your Address"></textarea>
        </div><br>
        <div>
            <label for="">Date of Birth</label>
            <input type="date"/>
        </div><br>
        <div>
            <label for="">Profile pic</label>
            <input type="file"/>
        </div><br>

        <button>Register</button>
    </form>
</head>

</html>
